<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- night-teal backdrop, rounded square (Fluent-ish corner) -->
  <rect width="128" height="128" rx="22" fill="#1f3036"/>

  <!-- crooked moon (B-grade two-tone glow) -->
  <circle cx="100" cy="28" r="10" fill="#f5d784" opacity="0.35"/>
  <circle cx="100" cy="28" r="6" fill="#f5d784" opacity="0.85"/>

  <!-- bumpy ground silhouette -->
  <path d="M 0 112 Q 30 109, 60 113 T 128 111 L 128 128 L 0 128 Z" fill="#0e1c1f"/>

  <!-- shack body — leaning right, parallelogram -->
  <polygon points="28,68 96,62 102,114 22,108" fill="#8d6f4a" stroke="#3d2a18" stroke-width="2"/>

  <!-- vertical plank seams (intentionally not parallel) -->
  <line x1="42" y1="66" x2="40" y2="111" stroke="#5a4128" stroke-width="1.5"/>
  <line x1="58" y1="65" x2="58" y2="112" stroke="#5a4128" stroke-width="1.5"/>
  <line x1="74" y1="64" x2="76" y2="113" stroke="#5a4128" stroke-width="1.5"/>
  <line x1="88" y1="63" x2="92" y2="113" stroke="#5a4128" stroke-width="1.5"/>

  <!-- roof: lopsided, steep on left -->
  <polygon points="18,68 50,38 106,64" fill="#a05548" stroke="#3d2a18" stroke-width="2"/>
  <!-- patch: lighter rusty tile (right slope) -->
  <polygon points="50,38 86,52 78,58 56,46" fill="#bf6d57"/>
  <!-- patch: scorched scrap (left corner) -->
  <polygon points="22,66 36,52 38,62" fill="#6a3829"/>

  <!-- glowing window — primary visual hook -->
  <rect x="63" y="76" width="18" height="15" fill="#f5c95a" stroke="#3d2a18" stroke-width="1.5"/>
  <line x1="72" y1="76" x2="72" y2="91" stroke="#3d2a18" stroke-width="1"/>
  <line x1="63" y1="83" x2="81" y2="83" stroke="#3d2a18" stroke-width="1"/>
  <!-- soft glow halo -->
  <rect x="60" y="73" width="24" height="21" fill="#f5c95a" opacity="0.18" rx="3"/>

  <!-- crooked door -->
  <polygon points="36,84 52,86 53,113 35,112" fill="#2c1d12"/>
  <circle cx="48" cy="100" r="1.5" fill="#c4a55a"/>

  <!-- duct-tape patch on the wall -->
  <rect x="80" y="93" width="14" height="4" fill="#9a958a" stroke="#5a564f" stroke-width="0.5"
        opacity="0.9" transform="rotate(-4 87 95)"/>

  <!-- bent satellite dish on the roof, propped at an angle -->
  <ellipse cx="68" cy="42" rx="10" ry="3.5" fill="#bdb6a2" stroke="#3d2a18" stroke-width="1.2"/>
  <line x1="68" y1="42" x2="64" y2="50" stroke="#3d2a18" stroke-width="2"/>
  <circle cx="68" cy="39.5" r="1.5" fill="#3d2a18"/>

  <!-- crooked antenna with one cross-bar leaning -->
  <line x1="48" y1="38" x2="42" y2="14" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="42" y1="20" x2="34" y2="22" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="42" y1="19" x2="51" y2="15" stroke="#3a3a3a" stroke-width="1"/>

  <!-- a single crooked nail glint on the door frame -->
  <circle cx="51" cy="92" r="0.8" fill="#d4c89a"/>
</svg>
